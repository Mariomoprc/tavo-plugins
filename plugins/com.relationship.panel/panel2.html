<script>
(function() {
  try {
    var doc = window.top ? window.top.document : document;
    if (!doc || !doc.body) { doc = document; }
    var oldP = doc.getElementById('rel-pn'); if (oldP) oldP.remove();
    var oldS = doc.getElementById('rel-ss'); if (oldS) oldS.remove();
    var oldTB = doc.getElementById('rel-tb'); if (oldTB) oldTB.remove();

    var css = doc.createElement('style'); css.id = 'rel-ss';
    css.textContent = 'div#rel-pn{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(360px,calc(100vw - 40px));height:min(500px,calc(100vh - 120px));background:#1a1a1a;border:1px solid #333;border-radius:4px;z-index:9999999;flex-direction:column;font-family:"Courier New",monospace;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5)}div#rel-pn.rel-open{display:flex}.rel-hd{padding:10px 12px;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.rel-hd h3{margin:0;color:#fff;font-size:13px;font-weight:bold}.rel-tabs{display:flex;gap:4px;padding:8px 10px 0;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #333;position:relative;touch-action:pan-x;scrollbar-width:none;-ms-overflow-style:none}.rel-tabs::-webkit-scrollbar{display:none}.rel-tab{padding:7px 12px;font-size:13px;color:#888;cursor:pointer;border-radius:2px 2px 0 0;white-space:nowrap;flex-shrink:0;transition:all .15s ease}.rel-tab:hover{color:#fff;background:#2a2a2a}.rel-tab.rel-active{color:#fff;background:#2a2a2a;font-weight:bold}.rel-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px 10px;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;touch-action:auto}.rel-x{background:none;border:none;color:#888;font-size:16px;cursor:pointer;padding:0}.rel-x:hover{color:#fff}.rel-sec{background:#1a1a1a;border:1px solid #333;border-radius:4px;overflow:hidden;margin-bottom:8px}.rel-sec-hd{padding:8px 10px;border-bottom:1px solid #333;font-size:13px;font-weight:bold;color:#fff}.rel-sec-bd{padding:8px 10px;font-size:14px;line-height:1.7;overflow:hidden}.rel-pre{white-space:pre-wrap;word-break:break-word;font-family:inherit;margin:0;font-size:14px;line-height:1.7;color:#e0e0e0;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;max-width:100%}.rel-empty{color:#888;text-align:center;padding:20px 0;font-size:12px}.rel-progress{color:#fff;text-align:center;padding}.rel-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(99,102,241,.08);font-size:13px;color:#e0e0e0}.rel-stat:last-child{border-bottom:none}.rel-stat-lbl{color:#94a3b8}.rel-stat-val{color:#e0e0e0;font-weight:600}.rel-tog{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-top:10px;background:#1a1a1a;border:1px solid #333;border-radius:10px;font-size:13px}.rel-tog-lbl{color:#94a3b8}.rel-tog-btn{padding:4px 12px;border-radius:12px;border:1px solid #333;background:transparent;color:#fff;font-size:12px;cursor:pointer}.rel-tog-btn:hover{background:#2a2a2a}.rel-tog-btn.on{background:#818cf8;color:#fff;border-color:#fff}.rel-info{font-size:11px;color:#888;text-align:right;padding:4px 0}.rel-sbox{width:100%;padding:8px 10px;background:#1a1a1a;border:1px solid rgba(99,102,241,.2);border-radius:8px;color:#e0e0e0;font-size:13px;outline:none;box-sizing:border-box;margin-bottom:8px}.rel-sbox:focus{border-color:#fff}.rel-sres{padding:8px 10px;border-bottom:1px solid rgba(99,102,241,.08);cursor:pointer}.rel-sres:hover{background:#2a2a2a;border-radius:6px}.rel-sres-role{font-size:11px;color:#888}.rel-sres-role.u{color:#fff}.rel-sres-role.c{color:#aaa}.rel-sres-txt{font-size:12.5px;color:#e0e0e0;line-height:1.5;margin-top:2px}.rel-sres em{color:#fff;font-style:normal;background:rgba(251,191,36,.15);padding:0 2px;border-radius:2px}.ri-r{display:flex;flex-wrap:wrap;align-items:center;gap:4px 8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}.ri-r:last-child{border-bottom:none}.ri-n{font-size:14px;font-weight:bold;color:#4fc3f7;min-width:36px}.ri-g{font-size:12px;color:#aaa;background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:3px}.ri-bi{font-size:12px;color:#94a3b8;padding:2px 0 2px 12px;line-height:1.6}.ri-l{font-size:12px;color:#ccc;padding:2px 0 2px 12px;line-height:1.6}.ri-t{font-size:13px;color:#e0e0e0;line-height:1.7;padding:2px 0}.ri-sh{font-size:13px;color:#fff;font-weight:600;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px}.ri-s{margin-bottom:10px}.rel-rf{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:6px 8px;border-radius:3px}.rel-rf:hover{color:#fff;background:rgba(255,255,255,0.08)}';
    doc.head.appendChild(css);

    var pn = doc.createElement('div'); pn.id = 'rel-pn'; doc.body.appendChild(pn);
    var state = { chatId: null, chars: [], tab: 'status', _pendingGen: {}, _cachedSummary: null };

    doc.addEventListener('click', function(e) { if (pn.classList.contains('rel-open') && !pn.contains(e.target) && e.target.id !== 'rel-fb') { saveScroll(); pn.classList.remove('rel-open'); } });
    pn.addEventListener('click', function(e) { var t = e.target; if (t.classList && t.classList.contains('rel-name')) { e.stopPropagation(); copyName(t.getAttribute('data-name')); } });

    var lastChatId = null; var lastMsgCount = 0; var _genSeq = 0;
    setInterval(async function() {
      try {
        var chat = await tavo.chat.current();
        if (!chat || chat.id === lastChatId) {
          if (chat) {
            var mc = await tavo.message.count();
            if (mc > lastMsgCount && lastMsgCount > 0) state._newMsgPending = true;
            lastMsgCount = mc;
          }
          return;
        }
        var seq = ++_genSeq;
        state._cachedSummary = null;
        state._pendingGen = {};
        state._newMsgPending = false;
        state.chatId = chat.id; state.chars = [];
        if (chat.characters) {
          for (var i = 0; i < chat.characters.length; i++) {
            var c = chat.characters[i]; var full = null;
            try { full = await tavo.character.get(c.id); } catch(e) {}
            if (seq !== _genSeq) return;
            var p = { id: c.id, name: c.name, avatar: c.avatar||'', description: '', personality: '', scenario: '', creator_notes: '', first_mes: '', system_prompt: '', post_history_instructions: '', alternate_greetings: [], mes_example: '' };
            if (full) {
              p.description = full.description||''; p.personality = full.personality||''; p.scenario = full.scenario||'';
              p.creator_notes = full.creator_notes||''; p.first_mes = full.first_mes||'';
              p.system_prompt = full.system_prompt||''; p.post_history_instructions = full.post_history_instructions||'';
              p.alternate_greetings = full.alternate_greetings||[]; p.mes_example = full.mes_example||'';
            }
            state.chars.push(p);
          }
        }
        lastChatId = chat.id;
        lastMsgCount = await tavo.message.count();
        startSceneSummary(state.chars);
        if (pn.classList.contains('rel-open')) render();
      } catch(e) {}
    }, 5000);

    function toggle() {
      if (pn.classList.contains('rel-open')) { saveScroll(); pn.classList.remove('rel-open'); return; }
      var cyoaP = doc.getElementById('cyoa-pn');
      if (cyoaP && cyoaP.style.display === 'flex') cyoaP.style.display = 'none';
      pn.classList.add('rel-open'); render();
      for (var ci = 0; ci < state.chars.length; ci++) { if (!state.chars[ci]._summary) startSceneSummary(state.chars); break; }
      setTimeout(restoreScroll, 50);
    }
    function close() { saveScroll(); pn.classList.remove('rel-open'); }

    async function loadData() {
      try {
        var chat = await tavo.chat.current();
        if (!chat) return;
        state.chatId = chat.id;
        state.chars = [];
        if (chat.characters) {
          for (var i = 0; i < chat.characters.length; i++) {
            var c = chat.characters[i]; var full = null;
            try { full = await tavo.character.get(c.id); } catch(e) {}
            var p = { id: c.id, name: c.name, avatar: c.avatar||'', description: '', personality: '', scenario: '', creator_notes: '', first_mes: '', system_prompt: '', post_history_instructions: '', alternate_greetings: [], mes_example: '' };
            if (full) {
              p.description = full.description||'';
              p.personality = full.personality||'';
              p.scenario = full.scenario||'';
              p.creator_notes = full.creator_notes||'';
              p.first_mes = full.first_mes||'';
              p.system_prompt = full.system_prompt||'';
              p.post_history_instructions = full.post_history_instructions||'';
              p.alternate_greetings = full.alternate_greetings||[];
              p.mes_example = full.mes_example||'';
            }
            state.chars.push(p);
          }
        }
        var savedTab = tavo.get('relTab', 'global');
        if (savedTab) state.tab = savedTab;
      } catch(e) { console.error('RelPanel loadData:', e); }
    }

    function showToast(msg) {
      var t = doc.createElement('div'); t.className = 'rel-toast'; t.textContent = msg;
      doc.body.appendChild(t);
      setTimeout(function() { t.remove(); }, 1500);
    }

    async function copyName(name) {
      try {
        var cur = '';
        try { cur = await tavo.input.get() || ''; } catch(e) {}
        tavo.input.set(cur + name);
        showToast('\u5df2\u8f93\u5165 ' + name);
      } catch(e) { showToast(name); }
    }

    function getNames(ch) {
      if (ch._names) return ch._names;
      ch._names = extractCharNames(ch.personality || ch.description);
      if (ch._names.length === 0) ch._names = [ch.name];
      return ch._names;
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function stripTemplate(s) {
      if (!s) return '';
      s = s.replace(/<%(?:#|=)?[\s\S]*?-%?>/g, '');
      s = s.replace(/\{\{(?:set|get|add|inc|dec)var[^}]*\}\}/g, '');
      s = s.replace(/\{\{(?:char|user|group|random|roll|time|date|weekday|isotime|isodate|idle_duration)[^}]*\}\}/g, '');
      s = s.replace(/```[\s\S]*?```/g, '');
      s = s.replace(/<\/?(?:card|worldview|onboarding|character|competitors|task_system|target_variety|tone|kickoff|writing_guidelines|system_tags|user_identity|appearance_handicap)(?:\s[^>]*)?>/gi, '');
      s = s.replace(/<[a-zA-Z\/][^>]*>/g, '');
      s = s.replace(/^[#{}\/\/].*$/gm, '');
      s = s.replace(/^\s*[\r\n]/gm, '');
      s = s.replace(/\n{3,}/g, '\n\n');
      return s.trim();
    }

    function formatText(s) {
      if (!s) return '';
      s = s.replace(/<%(?:#|=)?[\s\S]*?-%?>/g, '');
      s = s.replace(/<style[\s\S]*?<\/style>/gi, '');
      s = s.replace(/<[a-zA-Z\/][^>]*>/g, '');
      s = s.replace(/@[a-z-]+\{[^}]*\}/gi, '');
      s = s.replace(/^#{1,4}\s*/gm, '');
      s = s.replace(/\*\*([^*]+)\*\*/g, '$1');
      s = s.replace(/^[-—━]{3,}$/gm, '');
      s = s.replace(/^[\s]*[-*]\s+/gm, '');
      s = s.replace(/[■▷▶●◆○□]/g, '');
      s = s.replace(/^(?:#+\s*)?\d+[.\uff0e\u3001\)\uff09]\s*/gm, '');
      s = s.replace(/[①②③④⑤⑥⑦⑧⑨⑩]/g, '');
      s = s.replace(/\[CHAR-[^\]]*\]/g, '');
      s = s.replace(/\[[A-Z]+-\d+[^\]]*\]/g, '');
      s = s.replace(/<StatusBar[^>]*\/>/g, '');
      s = s.replace(/<\/?[a-z]+-[a-z]+[^>]*>/gi, '');
      s = s.replace(/^.*?[\/*]{3,}.*$/gm, '');
      s = s.replace(/\n{3,}/g, '\n\n');
      s = s.replace(/^\s*[\r\n]/gm, '');
      return s.trim();
    }

    function makeClickable(content, names) {
      var html = escHtml(content);
      if (!names || names.length === 0) return html;
      for (var i = 0; i < names.length; i++) {
        var n = names[i];
        var esc = n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        html = html.replace(new RegExp(esc, 'g'), '<span class="rel-name" data-name="' + n + '">' + n + '</span>');
        var short = n.replace(/[?][^?]*[?]/g, '').trim();
        if (short && short.length >= 2 && short !== n) {
          var escShort = short.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          html = html.replace(new RegExp(escShort, 'g'), '<span class="rel-name" data-name="' + n + '">' + short + '</span>');
        }
      }
      return html;
    }

    function extractCharNames(desc) {
      if (!desc) return [];
      var names = []; var seen = {}; var parts = desc.split('##');
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i].trim();
        var paren = p.indexOf('\uff08');
        if (paren > 0) {
          var n = p.substring(0, paren).trim();
          if (n && !seen[n] && n.length >= 2 && n.length <= 6 && !/^[#\d\u3010]/.test(n)) {
            seen[n] = true; names.push(n);
          }
        }
      }
      return names;
    }

    async function render() {
      if (state.chars.length === 0) { await loadData(); }
      buildUI();
    }

    function setTab(t) { saveScroll(); state.tab = t; tavo.set('relTab', t, 'global'); buildUI(); setTimeout(restoreScroll, 50); }

    function buildUI() {
      pn.innerHTML = '';
      var tabs = doc.createElement('div'); tabs.className = 'rel-tabs';
      var items = [
        { id: 'status', label: '\u60c5\u62a5\u7ad9' },
        { id: 'card', label: '\u89d2\u8272\u5361' },
        { id: 'lore', label: '\u4e16\u754c\u4e66' }
      ];
      for (var t = 0; t < items.length; t++) {
        var tab = doc.createElement('div'); tab.className = 'rel-tab' + (state.tab === items[t].id ? ' rel-active' : '');
        tab.textContent = items[t].label;
        tab.addEventListener('click', (function(tabId) { return function(e) { e.stopPropagation(); setTab(tabId); }; })(items[t].id));
        tabs.appendChild(tab);
      }
      var rf = doc.createElement('button'); rf.className = 'rel-rf'; rf.textContent = '\u27f3';
      rf.title = '\u5237\u65b0\u60c5\u62a5';
      if (state.tab !== 'status') rf.style.display = 'none';
      rf.addEventListener('click', function(e) { e.stopPropagation();
        for (var ci = 0; ci < state.chars.length; ci++) { state.chars[ci]._summary = null; }
        state._cachedSummary = null; state._pendingGen = {}; if (state._timerId) { clearInterval(state._timerId); state._timerId = null; }
        if (state.tab === 'status') { buildUI(); startSceneSummary(state.chars); }
      });
      tabs.appendChild(rf);
      pn.appendChild(tabs);
      var body = doc.createElement('div'); body.id = 'rel-body'; body.className = 'rel-body'; pn.appendChild(body);
      if (state.chars.length === 0) { body.innerHTML = '<div class="rel-empty">\u672a\u68c0\u6d4b\u5230\u89d2\u8272\u5361</div>'; return; }
      if (state.tab === 'status') renderStatus(body);
      else if (state.tab === 'card') renderCharCard(body);
      else if (state.tab === 'lore') renderLore(body);
    }

    function renderCharCard(body) {
      var text = '';
      for (var ci = 0; ci < state.chars.length; ci++) {
        var ch = state.chars[ci];
        if (ch.description) { var c = formatText(ch.description); if (c) text += '\ud83d\udcdd ' + ch.name + '\n' + c + '\n\n'; }
        if (ch.personality) { var c = formatText(ch.personality); if (c) text += '\ud83e\udde0 ' + ch.name + '\n' + c + '\n\n'; }
        if (ch.scenario) { var c = formatText(ch.scenario); if (c) text += '\ud83c\udfad ' + ch.name + '\n' + c + '\n\n'; }
        if (ch.creator_notes) { var c = formatText(ch.creator_notes); if (c) text += '\ud83d\udccb ' + ch.name + '\n' + c + '\n\n'; }
        if (ch.first_mes) { var c = formatText(ch.first_mes.substring(0, 500)); if (c) text += '\ud83c\udfac ' + ch.name + ' \u5f00\u573a\u767d\n' + c + '\n\n'; }
      }
      if (!text) { body.innerHTML = '<div class="rel-empty">\u6682\u65e0\u89d2\u8272\u5361\u4fe1\u606f</div>'; return; }
      var names = state.chars[0] ? getNames(state.chars[0]) : [];
      var el = doc.createElement('div'); el.style.cssText = 'white-space:pre-wrap;line-height:1.8;font-size:14px;color:#e0e0e0;padding:8px';
      el.innerHTML = makeClickable(escHtml(text), names); body.appendChild(el);
    }

    async function renderLore(body) {
      if (state.tab !== 'lore') return;
      var text = '';
      try {
        var chat = await tavo.chat.current();
        if (chat && chat.lorebooks && chat.lorebooks.length > 0) {
          for (var i = 0; i < chat.lorebooks.length; i++) {
            var ref = chat.lorebooks[i];
            if (!ref || !ref.id) continue;
            try {
              var lb = await tavo.lorebook.get(ref.id);
              if (lb && lb.entries) {
                for (var j = 0; j < lb.entries.length; j++) {
                  var entry = lb.entries[j];
                  var cts = entry.content || entry.text || entry.value || '';
                  for (var k in entry) {
                    if (typeof entry[k] === 'string' && entry[k].length > 5 && !/(identifier|id|name)/i.test(k)) { cts = entry[k]; break; }
                  }
                  if (cts && cts.length > 5 && cts.indexOf('<%') < 0 && cts.indexOf('getvar') < 0 && cts.indexOf('setvar') < 0) text += cts + '\n\n';
                }
              }
            } catch(e) {}
          }
        }
      } catch(e) {}
      if (text) {
        var names = state.chars[0] ? getNames(state.chars[0]) : [];
        var el = doc.createElement('div'); el.style.cssText = 'white-space:pre-wrap;line-height:1.8;font-size:14px;color:#e0e0e0;padding:8px';
        el.innerHTML = makeClickable(escHtml(text), names); body.appendChild(el);
      } else { body.innerHTML = '<div class="rel-empty">\u6682\u65e0\u4e16\u754c\u4e66\u6570\u636e</div>'; }
    }

    function renderStatus(body) {
      body.innerHTML = '';
      if (state.chars.length === 0) { body.innerHTML = '<div class="rel-empty">\u6682\u65e0\u89d2\u8272\u4fe1\u606f</div>'; return; }
      var summaryEl = doc.createElement('div'); summaryEl.id = 'rel-summary-0';
      if (state._newMsgPending && state.chars.length > 0) {
        state._newMsgPending = false;
        if (!state._pendingGen['scene']) startSceneSummary(state.chars);
      }
      var cached = state._cachedSummary || (state.chars[0] && state.chars[0]._summary);
      if (cached) {
        summaryEl.innerHTML = cached; body.appendChild(summaryEl);
        if (state._pendingGen['scene'] && !state._timerId) {
          state._timerId = setInterval(function() {
            if (!pn.classList.contains('rel-open') || state.tab !== 'status') { clearInterval(state._timerId); state._timerId = null; return; }
            if (!state._pendingGen['scene']) {
              clearInterval(state._timerId); state._timerId = null;
              var s = state._cachedSummary || (state.chars[0] && state.chars[0]._summary);
              if (s) { var el = doc.getElementById('rel-summary-0'); if (el) el.innerHTML = s; }
            }
          }, 500);
        }
        return;
      }
      if (!state._pendingGen['scene']) startSceneSummary(state.chars);
      var card = doc.createElement('div'); card.style.cssText = 'text-align:center;padding:40px 20px';
      var title = doc.createElement('div'); title.style.cssText = 'font-size:13px;color:#aaa;margin-bottom:6px';
      title.textContent = '\u60c5\u62a5\u751f\u6210\u4e2d...'; card.appendChild(title);
      var desc = doc.createElement('div'); desc.style.cssText = 'font-size:12px;color:#666';
      desc.textContent = '\u6b63\u5728\u5206\u6790\u89d2\u8272\u548c\u5267\u60c5'; card.appendChild(desc);
      var time = doc.createElement('div'); time.style.cssText = 'font-size:13px;color:#888;margin-top:8px';
      time.textContent = state._pendingGen['scene'] ? '\u23f11s' : '\u7b49\u5f85\u5206\u6790...';
      card.appendChild(time);
      summaryEl.appendChild(card); body.appendChild(summaryEl); state._timerEl = time;
      if (!state._timerId) {
        state._timerId = setInterval(function() {
          if (!pn.classList.contains('rel-open') || state.tab !== 'status') return;
          var firstCh = state.chars[0];
          if (!firstCh) { clearInterval(state._timerId); state._timerId = null; return; }
          var s = state._cachedSummary || firstCh._summary;
          if (s) {
            clearInterval(state._timerId); state._timerId = null;
            summaryEl.innerHTML = s;
            return;
          }
          if (!state._pendingGen['scene']) return;
          if (state._timerEl) { var sec = Math.floor((Date.now() - state._pendingGen['scene']) / 1000); state._timerEl.textContent = '\u23f1' + (sec + 1) + 's'; }
        }, 500);
      }
    }

    function renderInfoRow(line) {
      var parts = line.split('|');
      if (parts.length < 2) return '<div class="ri-t">' + line.trim() + '</div>';
      var tags = [];
      for (var p = 0; p < parts.length; p++) {
        var v = parts[p].trim();
        if (!v) continue;
        if (p === 0) { tags.push('<span class="ri-n">' + v + '</span>'); }
        else { tags.push('<span class="ri-g">' + v + '</span>'); }
      }
      return '<div class="ri-r">' + tags.join('') + '</div>';
    }

    function formatSummary(result, dur) {
      var text = result.trim();
      try { var data = JSON.parse(text); return jsonToHtml(data, dur); } catch(e) {}
      var m = text.match(/\{[\s\S]*\}/);
      if (m) { try { var data = JSON.parse(m[0]); return jsonToHtml(data, dur); } catch(e) {} }
      return mdToHtml(text, dur);
    }

    function jsonToHtml(data, dur) {
      var html = '';
      if (data.scene) {
        html += '<div class="ri-s"><div class="ri-sh">\u573a\u666f\u6982\u8ff0</div><div class="ri-t">' + escHtml(data.scene) + '</div></div>';
      }
      if (data.chars && data.chars.length > 0) {
        html += '<div class="ri-s"><div class="ri-sh">\u89d2\u8272\u72b6\u6001</div>';
        for (var i = 0; i < data.chars.length; i++) {
          var c = data.chars[i];
          var row = '<div class="ri-r"><span class="ri-n">' + escHtml(c.name||'') + '</span></div>';
          if (c.status) row += '<div class="ri-bi">' + escHtml(c.status) + '</div>';
          if (c.mood) row += '<div class="ri-l">' + escHtml(c.mood) + '</div>';
          if (c.item) row += '<div class="ri-l">' + escHtml(c.item) + '</div>';
          html += row;
        }
        html += '</div>';
      }
      if (data.situation && data.situation.length > 0) {
        html += '<div class="ri-s"><div class="ri-sh">\u5f53\u524d\u5c40\u52bf</div>';
        for (var i = 0; i < data.situation.length; i++) {
          html += '<div class="ri-l">' + (i+1) + '. ' + escHtml(data.situation[i]) + '</div>';
        }
        html += '</div>';
      }
      if (data.next) {
        html += '<div class="ri-s"><div class="ri-sh">\u4e0b\u4e00\u6b65</div><div class="ri-t">' + escHtml(data.next) + '</div></div>';
      }
      html += '<div style=\'text-align:center;padding-top:10px;font-size:11px;color:#555\'>\u23f1' + dur + 's \u00b7 \u65b0\u6d88\u606f\u81ea\u52a8\u5237\u65b0 \u00b7 \u70b9\u53f3\u4e0a\u89d2\u7684\u27f3\u624b\u52a8\u5237\u65b0</div>';
      return html || '<div style="color:#f88;font-size:12px;text-align:center;padding:20px">\u89e3\u6790\u5931\u8d25</div>';
    }

    function mdToHtml(text, dur) {
      var lines = text.split('\n');
      var html = '';
      var secTitle = ''; var secBody = [];
      function flushSec() {
        if (!secTitle || secBody.length === 0) return;
        html += '<div class="ri-s">';
        html += '<div class="ri-sh">' + secTitle + '</div>';
        for (var i = 0; i < secBody.length; i++) html += secBody[i];
        html += '</div>';
        secTitle = ''; secBody = [];
      }
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim(); if (!line) continue;
        if (/^##/.test(line)) {
          flushSec();
          secTitle = line.replace(/^##\s*/, '');
        } else if (secTitle && /^\d+[\.\)\u3001]/.test(line)) {
          secBody.push('<div class="ri-l">' + line.replace(/^\d+[\.\)\u3001]/, '') + '</div>');
        } else if (secTitle && /^[-*]\s/.test(line)) {
          secBody.push('<div class="ri-bi">' + line.replace(/^[-*]\s*/, '') + '</div>');
        } else if (secTitle && line.indexOf('|') >= 0) {
          secBody.push(renderInfoRow(line));
        } else if (secTitle) {
          secBody.push('<div class="ri-t">' + line + '</div>');
        }
      }
      flushSec();
      if (!html) { html = '<div class="ri-t" style="white-space:pre-wrap">' + escHtml(text) + '</div>'; }
      html += '<div style=\'text-align:center;padding-top:10px;font-size:11px;color:#555\'>\u23f1' + dur + 's \u00b7 \u65b0\u6d88\u606f\u81ea\u52a8\u5237\u65b0 \u00b7 \u70b9\u53f3\u4e0a\u89d2\u7684\u27f3\u624b\u52a8\u5237\u65b0</div>';
      return html;
    }

    async function startSceneSummary(_, force) {
      var chars = state.chars;
      if (!chars || chars.length === 0) return;
      if (state._pendingGen['scene']) return;
      var allDone = true;
      for (var ci = 0; ci < chars.length; ci++) { if (!chars[ci]._summary) { allDone = false; break; } }
      if (allDone && !force) return;
      var startTime = Date.now(); state._pendingGen['scene'] = startTime;
      var prompt = '';
      for (var ci = 0; ci < chars.length; ci++) {
        var ch = chars[ci];
        prompt += '\u5267\u60c5\u8d44\u6599\uff1a' + ch.name + '\n\u6027\u683c\uff1a' + (ch.personality||'').substring(0, 80) + '\n\u573a\u666f\uff1a' + (ch.scenario||'').substring(0, 50) + '\n\n';
      }
      prompt += '\u6839\u636e\u4ee5\u4e0a\u8d44\u6599\u548c\u804a\u5929\u5185\u5bb9\uff0c\u4ece\u89d2\u8272\u89c6\u89d2\u5206\u6790\u5f53\u524d\u5267\u60c5\u72b6\u6001\u3002\u5173\u6ce8\u6700\u91cd\u8981\u7684\u4fe1\u606f\uff1a\u73af\u5883\u6c1b\u56f4\u3001\u89d2\u8272\u5f53\u524d\u5904\u5883\u3001\u5173\u952e\u4e8b\u4ef6\u3001\u540e\u7eed\u53ef\u80fd\u8d70\u5411\u3002\u4e25\u683c\u6309JSON\u683c\u5f0f\u8f93\u51fa\uff0c\u4ec5\u8f93\u51faJSON\uff0c\u4e0d\u8981\u5176\u4ed6\u6587\u5b57\uff1a\n{"scene":"\u573a\u666f\u4e00\u53e5\u8bdd\u6982\u8ff0","chars":[{"name":"\u89d2\u8272\u540d","status":"\u5904\u5883","mood":"\u60c5\u7eea","item":"\u5173\u952e\u7269\u54c1\u6216\u76ee\u6807"}],"situation":["\u6700\u91cd\u8981\u5c40\u52bf","\u6b21\u8981\u5c40\u52bf"],"next":"\u4e0b\u4e00\u6b65\u53d1\u5c55\u65b9\u5411"}';
      var result = null;
      for (var attempt = 0; attempt < 2; attempt++) {
        try { result = await withTimeout(tavo.generate(prompt, {context:true}), 120000); break; } catch(e) {
          if (attempt === 0) { var retryEl = doc.getElementById('rel-summary-0'); if (retryEl) retryEl.innerHTML = retryEl.innerHTML.replace('\u751f\u6210\u4e2d', '\u91cd\u8bd5\u4e2d'); await new Promise(function(r) { setTimeout(r, 2000); }); }
        }
      }
      var summary = result ? formatSummary(result, Math.floor((Date.now() - startTime) / 1000)) : '<div style="color:#f88;font-size:12px">\u5206\u6790\u5931\u8d25</div>';
      for (var ci = 0; ci < chars.length; ci++) chars[ci]._summary = summary;
      state._cachedSummary = summary;
      delete state._pendingGen['scene'];
      if (pn.classList.contains('rel-open') && state.tab === 'status') { var el = doc.getElementById('rel-summary-0'); if (el && chars[0]._summary) { el.innerHTML = chars[0]._summary; if (state._timerEl) state._timerEl.textContent = ''; } }
    }

    function withTimeout(promise, ms) {
      return Promise.race([promise, new Promise(function(_, reject) { setTimeout(function() { reject(new Error('\u8d85\u65f6')); }, ms); })]);
    }

    function saveScroll() {
      if (!state.chatId) return;
      var b = pn.querySelector('.rel-body');
      if (b) tavo.set('relScroll_' + state.chatId + '_' + state.tab, b.scrollTop, 'global');
    }

    function restoreScroll() {
      if (!state.chatId) return;
      var b = pn.querySelector('.rel-body');
      if (b) b.scrollTop = tavo.get('relScroll_' + state.chatId + '_' + state.tab, 'global') || 0;
    }

    function injectBtn() {
      try {
        var existing = doc.getElementById('rel-tb');
        if (existing && existing.parentNode) { existing.style.display = ''; return true; }
        var bars = doc.querySelectorAll('.tav-action-bar');
        for (var i = 0; i < bars.length; i++) {
          var bar = bars[i];
          if (bar.children.length >= 2 && bar.querySelector('button')) {
            var tb = doc.createElement('button'); tb.id = 'rel-tb';
            tb.textContent = '\ud83d\udcd6'; tb.title = '\u89d2\u8272\u8d44\u6599';
            tb.addEventListener('click', function(e) { e.stopPropagation(); toggle(); });
            bar.appendChild(tb);
            return true;
          }
        }
        return false;
      } catch(e) { return false; }
    }
    injectBtn();
    var obs = new MutationObserver(function() { injectBtn(); });
    obs.observe(doc.body, { childList: true, subtree: true });
    setTimeout(injectBtn, 2000);
    setTimeout(injectBtn, 5000);

  } catch(e) { console.error('RelPanel init:', e); }
})();
</script>
