<script>
(function() {
  try {
    var doc = window.top ? window.top.document : document;
    if (!doc || !doc.body) { doc = document; }
    var oldP = doc.getElementById('rel-pn'); if (oldP) oldP.remove();
    var oldS = doc.getElementById('rel-ss'); if (oldS) oldS.remove();

    var css = doc.createElement('style'); css.id = 'rel-ss';
    css.textContent = 'div#rel-pn{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(360px,calc(100vw - 40px));height:min(500px,calc(100vh - 120px));background:#1a1a1a;border:1px solid #333;border-radius:4px;z-index:9999999;flex-direction:column;font-family:"Courier New",monospace;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5)}div#rel-pn.rel-open{display:flex}.rel-hd{padding:10px 12px;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.rel-hd h3{margin:0;color:#fff;font-size:13px;font-weight:bold}.rel-tabs{display:flex;gap:4px;padding:8px 10px 0;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #333;position:relative;touch-action:pan-x;scrollbar-width:none;-ms-overflow-style:none}.rel-tabs::-webkit-scrollbar{display:none}.rel-tab{padding:7px 12px;font-size:12px;color:#888;cursor:pointer;border-radius:2px 2px 0 0;white-space:nowrap;flex-shrink:0;transition:all .15s ease}.rel-tab:hover{color:#fff;background:#2a2a2a}.rel-tab.rel-active{color:#fff;background:#2a2a2a;font-weight:bold}.rel-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;touch-action:auto}.rel-x{background:none;border:none;color:#888;font-size:16px;cursor:pointer;padding:0}.rel-x:hover{color:#fff}.rel-sec{background:#1a1a1a;border:1px solid #333;border-radius:4px;overflow:hidden;margin-bottom:8px}.rel-sec-hd{padding:8px 10px;border-bottom:1px solid #333;font-size:12px;font-weight:bold;color:#fff}.rel-sec-bd{padding:8px 10px;font-size:13px;line-height:1.7;overflow:hidden}.rel-pre{white-space:pre-wrap;word-break:break-word;font-family:inherit;margin:0;font-size:13px;line-height:1.7;color:#e0e0e0;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;max-width:100%}.rel-empty{color:#888;text-align:center;padding:20px 0;font-size:12px}.rel-progress{color:#fff;text-align:center;padding}.rel-stat{display:flex;justify-conte... (line truncated to 2000 chars)
    doc.head.appendChild(css);
    var gs = doc.createElement('style');
    gs.textContent =
      'div#rel-pn{background:rgba(10,10,10,0.78)!important;-webkit-backdrop-filter:blur(15px)!important;backdrop-filter:blur(15px)!important;border:1px solid rgba(255,255,255,0.06)!important;border-radius:6px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important}'+
      '.rel-hd,.rel-tabs,.rel-x,.rel-sec,.rel-sec-hd,.rel-sec-bd{border-color:rgba(255,255,255,0.08)!important}'+
      '.rel-sec{background:rgba(10,10,10,0.5)!important}'+
      '.rel-sec-hd{background:rgba(10,10,10,0.3)!important}'+
      '.rel-body{scrollbar-width:none!important}.rel-body::-webkit-scrollbar{display:none!important}';
    doc.head.appendChild(gs);

    var pn = doc.createElement('div'); pn.id = 'rel-pn'; doc.body.appendChild(pn);
    var state = { chatId: null, chars: [], tab: 'card' };

    function injectBtn() {
      var bars = doc.querySelectorAll('.tav-action-bar');
      var bar = null;
      for (var i = 0; i < bars.length; i++) {
        if (bars[i].children.length >= 2 && bars[i].querySelector('button')) { bar = bars[i]; break; }
      }
      if (!bar) return false;
      var existing = doc.getElementById('rel-tb');
      if (existing) {
        if (existing.isConnected && doc.contains(existing)) {
          var cyoaBtn = doc.getElementById('cyoa-tb');
          if (cyoaBtn && cyoaBtn.isConnected) {
            var sibs = bar.children;
            var idx1 = -1, idx2 = -1;
            for (var j = 0; j < sibs.length; j++) {
              if (sibs[j] === existing) idx1 = j;
              if (sibs[j] === cyoaBtn) idx2 = j;
            }
            if (idx2 < 0) { /* CYOA不在bar → append */ }
            else if (idx1 >= 0 && idx1 < idx2) {
              bar.insertBefore(existing, cyoaBtn.nextSibling);
            }
          }
          return true;
        }
        bar.appendChild(existing);
        return true;
      }
      var btn = doc.createElement('button'); btn.id = 'rel-tb'; btn.className = 'tav-action-bar-button';
      btn.textContent = '\ud83d\udcd6'; btn.title = '\u89d2\u8272\u8d44\u6599';
      btn.addEventListener('click', function(e) { e.stopPropagation(); toggle(); });
      bar.appendChild(btn);
      return true;
    }
    injectBtn();
    setTimeout(injectBtn, 2000);
    setTimeout(injectBtn, 5000);
    var relObsTimer = null;
    var obs = new MutationObserver(function() {
      if (relObsTimer) clearTimeout(relObsTimer);
      relObsTimer = setTimeout(injectBtn, 200);
    });
    obs.observe(doc.body, { childList: true, subtree: true });
    doc.addEventListener('click', function(e) { if (pn.classList.contains('rel-open') && !pn.contains(e.target) && e.target.id !== 'rel-tb') { saveScroll(); pn.classList.remove('rel-open'); } });
    pn.addEventListener('click', function(e) { var t = e.target; if (t.classList && t.classList.contains('rel-name')) { e.stopPropagation(); copyName(t.getAttribute('data-name')); } });

    setInterval(async function() {
      try {
        var chat = await tavo.chat.current();
        if (chat && chat.id !== state.chatId) {
          state.chatId = chat.id; state.chars = [];
          if (chat.characters) {
            for (var i = 0; i < chat.characters.length; i++) {
              var c = chat.characters[i]; var full = null;
              try { full = await tavo.character.get(c.id); } catch(e) {}
              var p = { id: c.id, name: c.name, description: '', personality: '', scenario: '', first_mes: '' };
              if (full) {
                p.description = full.description||''; p.personality = full.personality||''; p.scenario = full.scenario||'';
                p.first_mes = full.first_mes||'';
              }
              state.chars.push(p);
            }
          }
        }
      } catch(e) {}
    }, 5000);


    function toggle() { if (pn.classList.contains('rel-open')) { saveScroll(); pn.classList.remove('rel-open'); } else { pn.classList.add('rel-open'); render(); } setTimeout(restoreScroll, 50); }
    function close() { saveScroll(); pn.classList.remove('rel-open'); }

    async function loadData() {
      try {
        var chat = await tavo.chat.current();
        if (!chat) return;
        state.chatId = chat.id;
        state.chars = [];
        if (chat.characters) {
          for (var i = 0; i < chat.characters.length; i++) {
            var c = chat.characters[i]; var full = null;
            try { full = await tavo.character.get(c.id); } catch(e) {}
            var p = { id: c.id, name: c.name, description: '', personality: '', scenario: '', first_mes: '' };
            if (full) {
              p.description = full.description||'';
              p.personality = full.personality||'';
              p.scenario = full.scenario||'';
              p.first_mes = full.first_mes||'';
            }
            state.chars.push(p);
          }
        }
        var savedTab = tavo.get('relTab', 'global');
        if (savedTab) state.tab = savedTab;
      } catch(e) { console.error('RelPanel loadData:', e); }
    }

    function showToast(msg) {
      var t = doc.createElement('div'); t.className = 'rel-toast'; t.textContent = msg;
      doc.body.appendChild(t);
      setTimeout(function() { t.remove(); }, 1500);
    }

    async function copyName(name) {
      try {
        var cur = '';
        try { cur = await tavo.input.get() || ''; } catch(e) {}
        tavo.input.set(cur + name);
        showToast('\u5df2\u8f93\u5165 ' + name);
      } catch(e) { showToast(name); }
    }

    function getNames(ch) {
      if (ch._names) return ch._names;
      ch._names = extractCharNames(ch.personality || ch.description);
      if (ch._names.length === 0) ch._names = [ch.name];
      return ch._names;
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }


    function stripTemplate(s) {
      if (!s) return '';
      s = s.replace(/<%(?:#|=)?[\s\S]*?-%?>/g, '');
      s = s.replace(/\{\{(?:set|get|add|inc|dec)var[^}]*\}\}/g, '');
      s = s.replace(/\{\{(?:char|user|group|random|roll|time|date|weekday|isotime|isodate|idle_duration)[^}]*\}\}/g, '');
      s = s.replace(/```[\s\S]*?```/g, '');
      s = s.replace(/<\/?(?:card|worldview|onboarding|character|competitors|task_system|target_variety|tone|kickoff|writing_guidelines|system_tags|user_identity|appearance_handicap)(?:\s[^>]*)?>/gi, '');
      s = s.replace(/<[a-zA-Z\/][^>]*>/g, '');
      s = s.replace(/^[#{}\/\/].*$/gm, '');
      s = s.replace(/^\s*[\r\n]/gm, '');
      s = s.replace(/\n{3,}/g, '\n\n');
      return s.trim();
    }

    function formatText(s) {
      if (!s) return '';
      s = s.replace(/<%(?:#|=)?[\s\S]*?-%?>/g, '');
      s = s.replace(/<style[\s\S]*?<\/style>/gi, '');
      s = s.replace(/<[a-zA-Z\/][^>]*>/g, '');
      s = s.replace(/@[a-z-]+\{[^}]*\}/gi, '');
      s = s.replace(/^#{1,4}\s*/gm, '');
      s = s.replace(/\*\*([^*]+)\*\*/g, '$1');
      s = s.replace(/^[-—━]{3,}$/gm, '');
      s = s.replace(/^[\s]*[-*]\s+/gm, '');
      s = s.replace(/[■▷▶●◆○□]/g, '');
      s = s.replace(/^(?:#+\s*)?\d+[.\uff0e\u3001\)\uff09]\s*/gm, '');
      s = s.replace(/[①②③④⑤⑥⑦⑧⑨⑩]/g, '');
      s = s.replace(/\[CHAR-[^\]]*\]/g, '');
      s = s.replace(/\[[A-Z]+-\d+[^\]]*\]/g, '');
      s = s.replace(/<StatusBar[^>]*\/>/g, '');
      s = s.replace(/<\/?[a-z]+-[a-z]+[^>]*>/gi, '');
      s = s.replace(/^.*?[\/*]{3,}.*$/gm, '');
      s = s.replace(/\n{3,}/g, '\n\n');
      s = s.replace(/^\s*[\r\n]/gm, '');
      return s.trim();
    }

    function makeClickable(content, names) {
      var html = escHtml(content);
      if (!names || names.length === 0) return html;
      for (var i = 0; i < names.length; i++) {
        var n = names[i];
        var esc = n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        html = html.replace(new RegExp(esc, 'g'), '<span class="rel-name" data-name="' + n + '">' + n + '</span>');
        var short = n.replace(/[?][^?]*[?]/g, '').trim();
        if (short && short.length >= 2 && short !== n) {
          var escShort = short.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          html = html.replace(new RegExp(escShort, 'g'), '<span class="rel-name" data-name="' + n + '">' + short + '</span>');
        }
      }
      return html;
    }

    function extractCharNames(desc) {
      if (!desc) return [];
      var names = []; var seen = {}; var parts = desc.split('##');
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i].trim();
        var paren = p.indexOf('\uff08');
        if (paren > 0) {
          var n = p.substring(0, paren).trim();
          if (n && !seen[n] && n.length >= 2 && n.length <= 6 && !/^[#\d\u3010]/.test(n)) {
            seen[n] = true; names.push(n);
          }
        }
      }
      return names;
    }

    async function render() {
      if (state.chars.length === 0) { await loadData(); }
      buildUI();
    }

    function setTab(t) { saveScroll(); state.tab = t; tavo.set('relTab', t, 'global'); buildUI(); setTimeout(restoreScroll, 50); }

    function buildUI() {
      pn.innerHTML = '';
      var tabs = doc.createElement('div'); tabs.id = 'rel-tabs'; tabs.className = 'rel-tabs';
      var items = [
        { id: 'card', label: '\u89d2\u8272\u5361' },
        { id: 'lore', label: '\u4e16\u754c\u4e66' }
      ];
      for (var t = 0; t < items.length; t++) {
        var tab = doc.createElement('div'); tab.className = 'rel-tab' + (state.tab === items[t].id ? ' rel-active' : '');
        tab.textContent = items[t].label;
        tab.addEventListener('click', (function(tabId) { return function(e) { e.stopPropagation(); setTab(tabId); }; })(items[t].id));
        tabs.appendChild(tab);
      }
      pn.appendChild(tabs);
      var body = doc.createElement('div'); body.id = 'rel-body'; body.className = 'rel-body'; pn.appendChild(body);

      if (state.chars.length === 0) {
        body.innerHTML = '<div class="rel-empty">\u672a\u68c0\u6d4b\u5230\u89d2\u8272\u5361</div>';
        return;
      }

      if (state.tab === 'card') renderCharCard(body);
      else if (state.tab === 'lore') renderLore(body);
    }

    function renderCharCard(body) {
      var text = '';
      for (var ci = 0; ci < state.chars.length; ci++) {
        var ch = state.chars[ci];
        if (ch.description) { var c = formatText(ch.description); if (c) text += '\ud83d\udcdd ' + ch.name + '\n' + c + '\n\n'; }
        if (ch.personality) { var c = formatText(ch.personality); if (c) text += '\ud83e\udde0 ' + ch.name + '\n' + c + '\n\n'; }
        if (ch.scenario) { var c = formatText(ch.scenario); if (c) text += '\ud83c\udfad ' + ch.name + '\n' + c + '\n\n'; }
        if (ch.first_mes) { var c = formatText(ch.first_mes.substring(0, 500)); if (c) text += '\ud83c\udfac ' + ch.name + ' \u5f00\u573a\u767d\n' + c + '\n\n'; }
      }
      if (!text) { body.innerHTML = '<div class="rel-empty">\u6682\u65e0\u89d2\u8272\u5361\u4fe1\u606f</div>'; return; }
      var names = state.chars[0] ? getNames(state.chars[0]) : [];
      var el = doc.createElement('div'); el.style.cssText = 'white-space:pre-wrap;line-height:1.8;font-size:13px;color:#e0e0e0;padding:8px';
      el.innerHTML = makeClickable(escHtml(text), names); body.appendChild(el);
    }

    async function renderLore(body) {
      if (state.tab !== 'lore') return;
      var text = '';
      try {
        var chat = await tavo.chat.current();
        if (chat && Array.isArray(chat.lorebooks) && chat.lorebooks.length > 0) {
          for (var i = 0; i < chat.lorebooks.length; i++) {
            var ref = chat.lorebooks[i];
            if (!ref || !ref.id) continue;
            try {
              var lb = await tavo.lorebook.get(ref.id);
              if (lb && Array.isArray(lb.entries)) {
                for (var j = 0; j < lb.entries.length; j++) {
                  var cts = lb.entries[j].content || '';
                  if (cts && cts.length > 5) text += cts + '\n\n';
                }
              }
            } catch(e) {}
          }
        }
      } catch(e) {}
      if (text) {
        var names = state.chars[0] ? getNames(state.chars[0]) : [];
        var el = doc.createElement('div'); el.style.cssText = 'white-space:pre-wrap;line-height:1.8;font-size:13px;color:#e0e0e0;padding:8px';
        el.innerHTML = makeClickable(escHtml(text), names); body.appendChild(el);
      } else {
        body.innerHTML = '<div class="rel-empty">\u6682\u65e0\u4e16\u754c\u4e66\u6570\u636e</div>';
      }
    }

    function saveScroll() {
      if (!state.chatId) return;
      var b = pn.querySelector('.rel-body');
      if (b) tavo.set('relScroll_' + state.chatId + '_' + state.tab, b.scrollTop, 'global');
    }

    function restoreScroll() {
      if (!state.chatId) return;
      var b = pn.querySelector('.rel-body');
      if (b) b.scrollTop = tavo.get('relScroll_' + state.chatId + '_' + state.tab, 'global') || 0;
    }


  } catch(e) { console.error('RelPanel init:', e); }
})();
</script>
