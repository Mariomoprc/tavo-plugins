<script>
(function() {
  try {
    var doc = window.top ? window.top.document : document;
    if (!doc || !doc.body) { doc = document; }

    var old3 = doc.getElementById('cyoa-ss');
    if (old3) old3.remove();
    var oldP = doc.getElementById('cyoa-pn');
    if (oldP) oldP.remove();

    var s = doc.createElement('style');
    s.id = 'cyoa-ss';
    s.textContent = 'div#cyoa-pn{display:none;position:fixed;width:320px;max-height:420px;background:#1a1a1a;border:1px solid #333;border-radius:4px;z-index:9999999;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5);flex-direction:column;font-family:"Courier New",monospace;color:#fff}div#cyoa-pn select{background:#2a2a2a;border:1px solid #444;border-radius:2px;color:#fff;font-size:11px;padding:3px 6px;font-family:"Courier New",monospace;outline:none}div#cyoa-pn select option{background:#2a2a2a;color:#fff}';
    doc.head.appendChild(s);

    var pn = doc.createElement('div');
    pn.id = 'cyoa-pn';
    doc.body.appendChild(pn);

    var busy = false; var genTimer = null;
    var genSeq = 0;
    var cachedItems = null;
    var cachedMsgCount = 0;

    // 风格配置
    var styleConfig = {
      main:     { icon: '🎯', label: '主线剧情' },
      daily:    { icon: '💬', label: '日常琐事' },
      romance:  { icon: '💕', label: '感情发展' },
      conflict: { icon: '⚡', label: '冲突紧张' },
      explore:  { icon: '🔍', label: '探索发现' }
    };
    var savedStyle = tavo.get('cyoaStyle', 'global');
    var currentStyle = (savedStyle && styleConfig[savedStyle]) ? savedStyle : 'main';

    // 风格对应的 Prompt（差异化设计）
    var prompts = {
      main:     '根据聊天内容，生成10个能推进主线剧情的下一步行动建议。这些建议应该是关键事件、转折点、重大决定，能显著推动故事发展。每个建议15字以内，用<suggestion>标签包裹。',
      daily:    '根据聊天内容，生成10个日常琐事的下一步行动建议。这些建议应该是闲聊、生活细节、鸡毛蒜皮的小事，轻松无目的。每个建议15字以内，用<suggestion>标签包裹。',
      romance:  '根据聊天内容，生成10个能推进感情与亲密关系的下一步行动建议。涵盖暧昧撩拨、情感升温、身体接触、亲密场景、性暗示等方向，内容大胆成人化。每个建议15字以内，用<suggestion>标签包裹。',
      conflict: '根据聊天内容，生成10个能制造冲突和紧张感的下一步行动建议。这些建议应该是矛盾、误会、争吵、危机、意外事件。每个建议15字以内，用<suggestion>标签包裹。',
      explore:  '根据聊天内容，生成10个能探索未知信息的下一步行动建议。这些建议应该帮助发现秘密、线索、新信息、揭秘。每个建议15字以内，用<suggestion>标签包裹。'
    };

    function enableDrag(handle) {
      pn.style.left = Math.max(0, Math.round((window.innerWidth - 320) / 2)) + 'px';
      pn.style.top = Math.max(0, Math.round((window.innerHeight - 420) / 2)) + 'px';
      handle.style.cursor = 'move';
      handle.style.userSelect = 'none';

      function onStart(cx, cy) {
        var startX = cx, startY = cy;
        var origL = pn.offsetLeft, origT = pn.offsetTop;

        function onMove(cx, cy) {
          var nl = Math.max(0, Math.min(window.innerWidth - pn.offsetWidth, origL + cx - startX));
          var nt = Math.max(20, Math.min(window.innerHeight - pn.offsetHeight, origT + cy - startY));
          pn.style.left = nl + 'px';
          pn.style.top = nt + 'px';
        }

        function onEnd() {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('touchend', onTouchEnd);
        }

        var onMouseMove = function(e) { e.preventDefault(); onMove(e.clientX, e.clientY); };
        var onMouseUp = function() { onEnd(); };
        var onTouchMove = function(e) { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); };
        var onTouchEnd = function() { onEnd(); };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.addEventListener('touchmove', onTouchMove, {passive: false});
        document.addEventListener('touchend', onTouchEnd);
      }

      handle.addEventListener('mousedown', function(e) { onStart(e.clientX, e.clientY); });
      handle.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
    }

    function injectBtn() {
      var bars = doc.querySelectorAll('.tav-action-bar');
      var bar = null;
      for (var i = 0; i < bars.length; i++) {
        if (bars[i].children.length >= 3 && bars[i].querySelector('button')) {
          bar = bars[i];
        }
      }
      if (!bar) return false;
      var existing = doc.getElementById('cyoa-tb');
      if (existing) { if (existing.isConnected || doc.contains(existing)) return true; existing.remove(); }
      var btn = doc.createElement('button');
      btn.id = 'cyoa-tb';
      btn.className = 'tav-action-bar-button';
      btn.textContent = '🎲';
      btn.title = 'CYOA';
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        if (pn.style.display === 'flex') {
          pn.style.display = 'none';
        } else {
          pn.style.display = 'flex';
          showDefault();
          var stale = false;
          if (cachedItems && cachedItems.length > 0) {
            try { var ms = await tavo.message.find([]); stale = (ms && ms.length !== cachedMsgCount); } catch(e) {}
          }
          if (cachedItems && cachedItems.length > 0 && !stale) {
            renderOptions(cachedItems);
            var de = doc.getElementById('cyoa-dur'); if (de) de.textContent = '';
          } else {
            doGen();
          }
        }
      });
      bar.appendChild(btn);
      return true;
    }

    injectBtn();

    var observer = new MutationObserver(function() {
      if (!doc.getElementById('cyoa-tb')) injectBtn();
    });
    observer.observe(doc.body, { childList: true, subtree: true });

    doc.addEventListener('click', function(e) {
      if (pn.style.display === 'flex' && !pn.contains(e.target) && e.target.id !== 'cyoa-tb') {
        pn.style.display = 'none'; busy = false; if (genTimer) { clearInterval(genTimer); genTimer = null; }
      }
    });

    function showDefault() {
      pn.innerHTML = '';
      // 标题行：标题 + 风格选择器 + 关闭按钮（单行）
      var hd = doc.createElement('div');
      hd.style.cssText = 'padding:10px 12px;border-bottom:1px solid #333;display:flex;align-items:center;gap:8px';
      var ttl = doc.createElement('span');
      ttl.textContent = '> 选择行动';
      ttl.style.cssText = 'color:#fff;font-size:13px;font-weight:bold;white-space:nowrap';
      hd.appendChild(ttl);

      // 风格选择器
      var styleSelect = doc.createElement('select');
      for (var key in styleConfig) {
        var opt = doc.createElement('option');
        opt.value = key;
        opt.textContent = styleConfig[key].icon + ' ' + styleConfig[key].label;
        if (key === currentStyle) opt.selected = true;
        styleSelect.appendChild(opt);
      }
      styleSelect.addEventListener('change', function(e) {
        e.stopPropagation();
        currentStyle = styleSelect.value;
        tavo.set('cyoaStyle', currentStyle, 'global');
        cachedItems = null; // 清除缓存，强制重新生成
        doGen();
      });
      hd.appendChild(styleSelect);

      // 生成时间显示
      var durEl = doc.createElement('span');
      durEl.id = 'cyoa-dur';
      durEl.style.cssText = 'color:#888;font-size:10px;margin-left:auto;font-family:"Courier New",monospace';
      durEl.textContent = '';
      hd.appendChild(durEl);

      // 关闭按钮
      var xb = doc.createElement('button');
      xb.textContent = '[x]';
      xb.style.cssText = 'background:none;border:none;color:#fff;font-size:12px;cursor:pointer;margin-left:auto;font-family:"Courier New",monospace';
      xb.addEventListener('click', function() { pn.style.display = 'none'; busy = false; if (genTimer) { clearInterval(genTimer); genTimer = null; } });
      hd.appendChild(xb);
      pn.appendChild(hd);
      enableDrag(hd);

      // 内容区域
      var bd = doc.createElement('div');
      bd.id = 'cyoa-bd';
      bd.style.cssText = 'padding:12px;flex:1;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center';
      var st = doc.createElement('div');
      st.textContent = '$ 点击生成选项';
      st.style.cssText = 'color:#888;font-size:12px';
      bd.appendChild(st);
      pn.appendChild(bd);
    }

    function parseSuggestions(text) {
      var items = [];
      var parts = text.split('<suggestion>');
      for (var i = 1; i < parts.length; i++) {
        var end = parts[i].split('</suggestion>');
        if (end[0] && end[0].trim()) items.push(end[0].trim());
      }
      // 过滤掉包含特定词汇的选项
      if (items.length > 0) {
        var blacklist = ['重要历史情节', '关键事件', '总结', '概述', '剧情回顾', '历史', '情节'];
        items = items.filter(function(item) {
          for (var i = 0; i < blacklist.length; i++) {
            if (item.includes(blacklist[i])) return false;
          }
          return true;
        });
      }
      if (items.length > 0) return items;
      try {
        var js = text.indexOf('['), je = text.lastIndexOf(']');
        if (js >= 0 && je > js) {
          var parsed = JSON.parse(text.substring(js, je + 1));
          if (Array.isArray(parsed)) return parsed.filter(function(x){return typeof x==='string' && x.trim();});
        }
      } catch(e) {}
      var lines = text.split('\n');
      for (var r = 0; r < lines.length; r++) {
        var m = lines[r].match(/^\d+[\.\)、]\s*(.+)/);
        if (m && m[1].trim()) items.push(m[1].trim());
      }
      if (items.length > 0) return items;
      items = [];
      for (var r = 0; r < lines.length; r++) {
        var m = lines[r].match(/^[\-\*]\s+(.+)/);
        if (m && m[1].trim()) items.push(m[1].trim());
      }
      if (items.length > 0) return items;
      items = [];
      for (var r = 0; r < lines.length; r++) {
        var t = lines[r].trim();
        if (t && t.length <= 20 && !t.match(/^(请|每个|建议|行动|从|用户|以下|下面)/)) items.push(t);
      }
      return items;
    }

    function renderOptions(items) {
      var bd = doc.getElementById('cyoa-bd');
      if (!bd) return;
      bd.innerHTML = '';
      bd.style.alignItems = 'stretch';
      bd.style.justifyContent = 'flex-start';
      items.forEach(function(t, i) {
        var b = doc.createElement('button');
        b.textContent = (i+1) + '. ' + t;
        b.style.cssText = 'width:100%;text-align:left;background:transparent;border:none;border-left:2px solid transparent;color:#e0e0e0;font-size:12px;padding:8px 12px;cursor:pointer;font-family:"Courier New",monospace';
        b.addEventListener('mouseenter', function() { b.style.background='#2a2a2a'; b.style.borderLeftColor='#fff'; });
        b.addEventListener('mouseleave', function() { b.style.background='transparent'; b.style.borderLeftColor='transparent'; });
        b.addEventListener('click', async function(e) {
          e.stopPropagation();
          pn.style.display = 'none'; busy = false;
          var cur = '';
          try { cur = await tavo.input.get() || ''; } catch(ex) {}
          tavo.input.set(cur + t);
        });
        bd.appendChild(b);
      });
      var reBtn = doc.createElement('button');
      reBtn.textContent = '[r] 重新生成';
      reBtn.style.cssText = 'width:100%;padding:6px 0;border-radius:2px;border:1px solid #444;background:transparent;color:#fff;font-size:11px;cursor:pointer;margin-top:8px;font-family:"Courier New",monospace';
      reBtn.addEventListener('click', function(e) { e.stopPropagation(); doGen(); });
      bd.appendChild(reBtn);
    }

    async function doGen() {
      ++genSeq;
      var curSeq = genSeq;
      busy = true;
      var bd = doc.getElementById('cyoa-bd');
      if (!bd) { busy = false; return; }
      var startTime = Date.now();
      bd.innerHTML = '<div style="color:#888;font-size:12px;text-align:center">> 思考中 <span id="cyoa-timer">1</span>s</div>';
      if (genTimer) clearInterval(genTimer);
      genTimer = setInterval(function() {
        var el = doc.getElementById('cyoa-timer');
        if (el) el.textContent = Math.ceil((Date.now() - startTime) / 1000);
      }, 500);
      try {
        var PROMPT = prompts[currentStyle] || prompts.main;
        var result = '';
        if (typeof tavo !== 'undefined' && tavo.generate) {
          result = await tavo.generate(PROMPT, { context: true });
        } else {
          throw new Error('tavo.generate not available');
        }
        clearInterval(genTimer); genTimer = null;
        if (curSeq !== genSeq) { busy = false; return; }
        var items = parseSuggestions(result);
        if (items.length === 0) {
          clearInterval(genTimer); genTimer = null;
          bd.innerHTML = '<div style="color:#888;font-size:12px;text-align:center">> 未能解析选项，请重试</div>';
          busy = false; return;
        }
        cachedItems = items;
        try { var ms = await tavo.message.find([]); cachedMsgCount = ms ? ms.length : 0; } catch(e) {}
        var duration = Math.floor((Date.now() - startTime) / 1000);
        renderOptions(items);
        var durEl = doc.getElementById('cyoa-dur');
        if (durEl) durEl.textContent = '⏱ ' + duration + 's';
      } catch(e) {
        clearInterval(genTimer); genTimer = null;
        bd.innerHTML = '<div style="color:#888;font-size:12px;text-align:center">> 生成失败: ' + (e.message||'') + '</div>';
      } finally {
        busy = false;
      }
    }

  } catch(e) {
    console.error('CYOA init error:', e);
  }
})();
</script>
