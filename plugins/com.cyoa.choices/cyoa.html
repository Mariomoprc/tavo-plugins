<script>
(function() {
  try {
    var doc = window.top ? window.top.document : document;
    if (!doc || !doc.body) { doc = document; }

    var old3 = doc.getElementById('cyoa-ss');
    if (old3) old3.remove();
    var oldP = doc.getElementById('cyoa-pn');
    if (oldP) oldP.remove();

    var s = doc.createElement('style');
    s.id = 'cyoa-ss';
    s.textContent = 'div#cyoa-pn{display:none;position:fixed;width:320px;max-height:420px;background:rgba(15,23,42,.95);border:1px solid rgba(99,102,241,.4);border-radius:16px;z-index:9999999;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5);flex-direction:column;font-family:-apple-system,sans-serif;color:#e2e8f0}';
    doc.head.appendChild(s);

    var pn = doc.createElement('div');
    pn.id = 'cyoa-pn';
    doc.body.appendChild(pn);

    var busy = false;
    var genSeq = 0;
    var cachedItems = null;
    var cachedMsgCount = 0;

    function enableDrag(handle) {
      pn.style.left = Math.max(0, Math.round((window.innerWidth - 320) / 2)) + 'px';
      pn.style.top = Math.max(0, Math.round((window.innerHeight - 420) / 2)) + 'px';
      handle.style.cursor = 'move';
      handle.style.userSelect = 'none';
      function onStart(cx, cy) {
        var startX = cx, startY = cy;
        var origL = pn.offsetLeft, origT = pn.offsetTop;
        function onMove(cx, cy) {
          var nl = Math.max(0, Math.min(window.innerWidth - pn.offsetWidth, origL + cx - startX));
          var nt = Math.max(20, Math.min(window.innerHeight - pn.offsetHeight, origT + cy - startY));
          pn.style.left = nl + 'px';
          pn.style.top = nt + 'px';
        }
        function onEnd() {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('touchend', onTouchEnd);
        }
        var onMouseMove = function(e) { e.preventDefault(); onMove(e.clientX, e.clientY); };
        var onMouseUp = function() { onEnd(); };
        var onTouchMove = function(e) { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); };
        var onTouchEnd = function() { onEnd(); };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.addEventListener('touchmove', onTouchMove, {passive: false});
        document.addEventListener('touchend', onTouchEnd);
      }
      handle.addEventListener('mousedown', function(e) { onStart(e.clientX, e.clientY); });
      handle.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
    }

    function injectBtn() {
      var bars = doc.querySelectorAll('.tav-action-bar');
      var bar = null;
      for (var i = 0; i < bars.length; i++) {
        if (bars[i].children.length >= 3 && bars[i].querySelector('button') && bars[i].isConnected) {
          bar = bars[i];
        }
      }
      if (!bar) return false;
      var existing = doc.getElementById('cyoa-tb');
      if (existing) {
        if (existing.isConnected || doc.contains(existing)) return true;
        existing.remove();
      }
      var btn = doc.createElement('button');
      btn.id = 'cyoa-tb';
      btn.className = 'tav-action-bar-button';
      btn.textContent = '\u{1F3B2}';
      btn.title = 'CYOA';
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        if (pn.style.display === 'flex') {
          pn.style.display = 'none';
        } else {
          pn.style.display = 'flex';
          showDefault();
          var stale = false;
          if (cachedItems && cachedItems.length > 0) {
            try { var ms = await tavo.message.find([]); stale = (ms && ms.length !== cachedMsgCount); } catch(e) {}
          }
          if (cachedItems && cachedItems.length > 0 && !stale) {
            renderOptions(cachedItems);
            var de = doc.getElementById('cyoa-dur'); if (de) de.textContent = '';
          } else {
            doGen();
          }
        }
      });
      bar.appendChild(btn);
      return true;
    }
    injectBtn();
    var observer = new MutationObserver(function() { injectBtn(); });
    observer.observe(doc.body, { childList: true, subtree: true });
    doc.addEventListener('click', function(e) {
      if (pn.style.display === 'flex' && !pn.contains(e.target) && e.target.id !== 'cyoa-tb') {
        pn.style.display = 'none'; busy = false;
      }
    });

    function showDefault() {
      pn.innerHTML = '';
      var hd = doc.createElement('div');
      hd.style.cssText = 'padding:12px 16px;border-bottom:1px solid rgba(99,102,241,.2);display:flex;justify-content:space-between;align-items:center';
      var ttl = doc.createElement('span');
      ttl.textContent = '\u{1F3B0} \u9009\u62E9\u4E0B\u4E00\u6B65\u884C\u52A8';
      ttl.style.cssText = 'color:#818cf8;font-size:14px;font-weight:600';
      hd.appendChild(ttl);
      var durEl = doc.createElement('span');
      durEl.id = 'cyoa-dur';
      durEl.style.cssText = 'color:#64748b;font-size:11px;margin-left:auto;margin-right:12px';
      hd.appendChild(durEl);
      var xb = doc.createElement('button');
      xb.textContent = 'X';
      xb.style.cssText = 'background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer;padding:2px 8px';
      xb.addEventListener('click', function() { pn.style.display = 'none'; busy = false; });
      hd.appendChild(xb);
      pn.appendChild(hd);
      enableDrag(hd);
      var bd = doc.createElement('div');
      bd.id = 'cyoa-bd';
      bd.style.cssText = 'padding:16px;flex:1;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center';
      var st = doc.createElement('div');
      st.textContent = '\u70B9\u51FB\u9AB0\u5B50\u6309\u94AE\u751F\u6210\u9009\u9879';
      st.style.cssText = 'color:#94a3b8;font-size:13px';
      bd.appendChild(st);
      pn.appendChild(bd);
    }

    function parseSuggestions(text) {
      var items = [];
      var parts = text.split('<suggestion>');
      for (var i = 1; i < parts.length; i++) {
        var end = parts[i].split('</suggestion>');
        if (end[0] && end[0].trim()) items.push(end[0].trim());
      }
      if (items.length > 0) return items;
      try {
        var js = text.indexOf('['), je = text.lastIndexOf(']');
        if (js >= 0 && je > js) {
          var parsed = JSON.parse(text.substring(js, je + 1));
          if (Array.isArray(parsed)) return parsed.filter(function(x){return typeof x==='string' && x.trim();});
        }
      } catch(e) {}
      var lines = text.split('\\n');
      for (var r = 0; r < lines.length; r++) {
        var m = lines[r].match(/^\\d+[\\.\\)\u3001]\\s*(.+)/);
        if (m && m[1].trim()) items.push(m[1].trim());
      }
      if (items.length > 0) return items;
      items = [];
      for (var r = 0; r < lines.length; r++) {
        var m = lines[r].match(/^[\\-\\*]\\s+(.+)/);
        if (m && m[1].trim()) items.push(m[1].trim());
      }
      if (items.length > 0) return items;
      items = [];
      for (var r = 0; r < lines.length; r++) {
        var t = lines[r].trim();
        if (t && t.length <= 20 && !t.match(/^(\u6211|\u6BCF\u6B21|\u4F60|\u884C\u52A8|\u5BF9\u8BDD|\u7528\u6237|\u8BF7\u6C42|\u56DE\u7B54)/)) items.push(t);
      }
      return items;
    }

    function renderOptions(items) {
      var bd = doc.getElementById('cyoa-bd');
      if (!bd) return;
      bd.innerHTML = '';
      bd.style.alignItems = 'stretch';
      bd.style.justifyContent = 'flex-start';
      items.forEach(function(t, i) {
        var b = doc.createElement('button');
        b.textContent = (i+1) + '. ' + t;
        b.style.cssText = 'width:100%;text-align:left;background:rgba(99,102,241,.2);border:1px solid transparent;border-radius:10px;color:#e2e8f0;font-size:13px;padding:10px 14px;cursor:pointer;margin-bottom:8px;display:block';
        b.addEventListener('mouseenter', function() { b.style.background='rgba(99,102,241,.35)'; b.style.borderColor='#818cf8'; });
        b.addEventListener('mouseleave', function() { b.style.background='rgba(99,102,241,.2)'; b.style.borderColor='transparent'; });
        b.addEventListener('click', async function(e) {
          e.stopPropagation();
          pn.style.display = 'none'; busy = false;
          var cur = '';
          try { cur = await tavo.input.get() || ''; } catch(ex) {}
          tavo.input.set(cur + t);
        });
        bd.appendChild(b);
      });
      var reBtn = doc.createElement('button');
      reBtn.textContent = '\u{1F504} \u518D\u6765\u4E00\u7EC4';
      reBtn.style.cssText = 'width:100%;padding:8px 0;border-radius:8px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.15);color:#818cf8;font-size:12px;cursor:pointer;margin-top:4px';
      reBtn.addEventListener('click', function(e) { e.stopPropagation(); doGen(); });
      bd.appendChild(reBtn);
    }

    async function doGen() {
      ++genSeq;
      var curSeq = genSeq;
      busy = true;
      var bd = doc.getElementById('cyoa-bd');
      if (!bd) { busy = false; return; }
      var startTime = Date.now();
      bd.innerHTML = '<div style="color:#94a3b8;font-size:13px;text-align:center">\u{1F914} \u601D\u8003\u4E2D... <span id="cyoa-timer">0</span>s</div>';
      var timer = setInterval(function() {
        var el = doc.getElementById('cyoa-timer');
        if (el) el.textContent = Math.floor((Date.now() - startTime) / 1000);
      }, 500);
      try {
        var result = '';
        if (typeof tavo !== 'undefined' && tavo.generate) {
          result = await tavo.generate('\u4E3A\u7528\u6237\u751F\u62105\u4E2A\u4E0B\u4E00\u6B65\u884C\u52A8\u9009\u9879\u3002\u4ECE\u7528\u6237\u89D2\u5EA6\u51FA\u53D1\uFF0C\u6BCF\u4E2A\u9009\u987915\u5B57\u5185\uFF0C\u5FC5\u987B\u4E0D\u540C\u3002\u6BCF\u4E2A\u9009\u9879\u7528<suggestion>\u6807\u7B7E\u5305\u88F9\uFF0C\u4E0D\u8981\u6709\u5176\u4ED6\u5185\u5BB9\u3002', { context: true });
        } else {
          throw new Error('tavo.generate not available');
        }
        clearInterval(timer);
        if (curSeq !== genSeq) { busy = false; return; }
        var items = parseSuggestions(result);
        if (items.length === 0) {
          bd.innerHTML = '<div style="color:#94a3b8;font-size:13px;text-align:center">\u672A\u80FD\u89E3\u6790\u9009\u9879\uFF0C\u8BF7\u91CD\u8BD5</div>';
          busy = false; return;
        }
        cachedItems = items;
        try { var ms = await tavo.message.find([]); cachedMsgCount = ms ? ms.length : 0; } catch(e) {}
        var duration = Math.floor((Date.now() - startTime) / 1000);
        renderOptions(items);
        var durEl = doc.getElementById('cyoa-dur');
        if (durEl) durEl.textContent = '\u23F1 ' + duration + 's';
      } catch(e) {
        clearInterval(timer);
        bd.innerHTML = '<div style="color:#94a3b8;font-size:13px;text-align:center">\u751F\u6210\u5931\u8D25: ' + (e.message||'') + '</div>';
      } finally {
        busy = false;
      }
    }
  } catch(e) {
    console.error('CYOA init error:', e);
  }
})();
</script>
